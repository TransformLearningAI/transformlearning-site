<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <!-- Pen and ink texture filter -->
    <filter id="ink" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply"/>
    </filter>
    <!-- Subtle cross-hatch pattern -->
    <pattern id="hatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#0C1F3F" stroke-width="0.3" opacity="0.15"/>
    </pattern>
    <pattern id="hatch2" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(-25)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#0C1F3F" stroke-width="0.25" opacity="0.1"/>
    </pattern>
    <!-- Glow for the future side -->
    <radialGradient id="futureGlow" cx="0.72" cy="0.5" r="0.35">
      <stop offset="0%" stop-color="#00A8A8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00A8A8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EEF2F7"/>
    </linearGradient>
  </defs>

  <!-- Paper background -->
  <rect width="800" height="450" fill="url(#skyGrad)"/>
  <rect width="800" height="450" fill="url(#hatch2)"/>

  <!-- Future glow (right side) -->
  <ellipse cx="620" cy="225" rx="250" ry="200" fill="url(#futureGlow)"/>

  <!-- Ground line -->
  <g filter="url(#ink)">
    <path d="M0 380 Q100 375 200 378 Q300 382 400 376 Q500 380 600 374 Q700 378 800 376"
          stroke="#0C1F3F" stroke-width="1.2" fill="none" opacity="0.6"/>
    <!-- Ground texture -->
    <path d="M0 385 Q50 383 100 386 Q200 382 300 387 Q400 384 500 386 Q600 383 700 387 Q750 385 800 386"
          stroke="#0C1F3F" stroke-width="0.5" fill="none" opacity="0.2"/>
  </g>

  <!-- THE WALL — crumbling, breaking apart -->
  <g filter="url(#ink)" opacity="0.85">
    <!-- Intact wall section (left side, taller) -->
    <!-- Bricks -->
    <rect x="355" y="160" width="30" height="14" rx="1" stroke="#0C1F3F" stroke-width="1" fill="url(#hatch)" opacity="0.7"/>
    <rect x="340" y="176" width="28" height="14" rx="1" stroke="#0C1F3F" stroke-width="1" fill="url(#hatch)" opacity="0.7"/>
    <rect x="370" y="176" width="22" height="14" rx="1" stroke="#0C1F3F" stroke-width="1" fill="url(#hatch)" opacity="0.7"/>
    <rect x="345" y="192" width="32" height="14" rx="1" stroke="#0C1F3F" stroke-width="1" fill="url(#hatch)" opacity="0.7"/>
    <rect x="338" y="208" width="26" height="14" rx="1" stroke="#0C1F3F" stroke-width="1" fill="url(#hatch)" opacity="0.7"/>
    <rect x="366" y="208" width="28" height="14" rx="1" stroke="#0C1F3F" stroke-width="1" fill="url(#hatch)" opacity="0.7"/>
    <rect x="342" y="224" width="30" height="14" rx="1" stroke="#0C1F3F" stroke-width="1" fill="url(#hatch)" opacity="0.7"/>
    <rect x="374" y="224" width="20" height="14" rx="1" stroke="#0C1F3F" stroke-width="1" fill="url(#hatch)" opacity="0.7"/>
    <rect x="336" y="240" width="28" height="14" rx="1" stroke="#0C1F3F" stroke-width="1" fill="url(#hatch)" opacity="0.7"/>
    <rect x="366" y="240" width="30" height="14" rx="1" stroke="#0C1F3F" stroke-width="1" fill="url(#hatch)" opacity="0.7"/>
    <rect x="340" y="256" width="32" height="14" rx="1" stroke="#0C1F3F" stroke-width="1" fill="url(#hatch)" opacity="0.7"/>
    <rect x="374" y="256" width="22" height="14" rx="1" stroke="#0C1F3F" stroke-width="1" fill="url(#hatch)" opacity="0.7"/>
    <!-- More wall going down -->
    <rect x="335" y="272" width="26" height="14" rx="1" stroke="#0C1F3F" stroke-width="1" fill="url(#hatch)" opacity="0.7"/>
    <rect x="363" y="272" width="32" height="14" rx="1" stroke="#0C1F3F" stroke-width="1" fill="url(#hatch)" opacity="0.7"/>
    <rect x="338" y="288" width="30" height="14" rx="1" stroke="#0C1F3F" stroke-width="1" fill="url(#hatch)" opacity="0.7"/>
    <rect x="370" y="288" width="26" height="14" rx="1" stroke="#0C1F3F" stroke-width="1" fill="url(#hatch)" opacity="0.7"/>
    <rect x="334" y="304" width="28" height="14" rx="1" stroke="#0C1F3F" stroke-width="1" fill="url(#hatch)" opacity="0.7"/>
    <rect x="364" y="304" width="32" height="14" rx="1" stroke="#0C1F3F" stroke-width="1" fill="url(#hatch)" opacity="0.7"/>
    <rect x="336" y="320" width="32" height="14" rx="1" stroke="#0C1F3F" stroke-width="1" fill="url(#hatch)" opacity="0.7"/>
    <rect x="370" y="320" width="26" height="14" rx="1" stroke="#0C1F3F" stroke-width="1" fill="url(#hatch)" opacity="0.7"/>
    <rect x="333" y="336" width="30" height="14" rx="1" stroke="#0C1F3F" stroke-width="1" fill="url(#hatch)" opacity="0.7"/>
    <rect x="365" y="336" width="32" height="14" rx="1" stroke="#0C1F3F" stroke-width="1" fill="url(#hatch)" opacity="0.7"/>
    <rect x="336" y="352" width="28" height="14" rx="1" stroke="#0C1F3F" stroke-width="1" fill="url(#hatch)" opacity="0.7"/>
    <rect x="366" y="352" width="30" height="14" rx="1" stroke="#0C1F3F" stroke-width="1" fill="url(#hatch)" opacity="0.7"/>
    <rect x="334" y="368" width="32" height="14" rx="1" stroke="#0C1F3F" stroke-width="1" fill="url(#hatch)" opacity="0.7"/>
    <rect x="368" y="368" width="28" height="14" rx="1" stroke="#0C1F3F" stroke-width="1" fill="url(#hatch)" opacity="0.7"/>

    <!-- Falling / scattered bricks (the wall breaking) -->
    <rect x="400" y="310" width="24" height="12" rx="1" stroke="#0C1F3F" stroke-width="0.8" fill="url(#hatch)" opacity="0.5" transform="rotate(15 412 316)"/>
    <rect x="408" y="345" width="20" height="11" rx="1" stroke="#0C1F3F" stroke-width="0.8" fill="url(#hatch)" opacity="0.45" transform="rotate(-8 418 350)"/>
    <rect x="415" y="365" width="22" height="12" rx="1" stroke="#0C1F3F" stroke-width="0.8" fill="url(#hatch)" opacity="0.4" transform="rotate(25 426 371)"/>
    <rect x="395" y="370" width="18" height="10" rx="1" stroke="#0C1F3F" stroke-width="0.7" fill="url(#hatch)" opacity="0.35" transform="rotate(-12 404 375)"/>
    <rect x="405" y="258" width="20" height="11" rx="1" stroke="#0C1F3F" stroke-width="0.8" fill="url(#hatch)" opacity="0.4" transform="rotate(20 415 263)"/>
    <rect x="398" y="230" width="18" height="10" rx="1" stroke="#0C1F3F" stroke-width="0.7" fill="url(#hatch)" opacity="0.35" transform="rotate(-18 407 235)"/>
  </g>

  <!-- FIGURE — educator stepping through the gap -->
  <g filter="url(#ink)">
    <!-- Body -->
    <path d="M310 210 Q312 195 315 185 Q318 175 320 170" stroke="#0C1F3F" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <!-- Head -->
    <ellipse cx="322" cy="160" rx="12" ry="14" stroke="#0C1F3F" stroke-width="1.5" fill="#F8FAFC"/>
    <!-- Hair suggestion -->
    <path d="M311 155 Q314 145 322 142 Q330 145 333 155" stroke="#0C1F3F" stroke-width="1.2" fill="none"/>
    <!-- Torso -->
    <path d="M308 220 Q310 240 312 260 Q313 275 310 295" stroke="#0C1F3F" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M320 220 Q318 240 316 260 Q315 275 318 295" stroke="#0C1F3F" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Shoulders / jacket suggestion -->
    <path d="M295 215 Q305 208 314 210 Q320 210 330 208 Q338 215 340 220" stroke="#0C1F3F" stroke-width="1.3" fill="none" stroke-linecap="round"/>
    <!-- Left arm — reaching forward through the wall -->
    <path d="M295 218 Q285 235 280 248 Q278 255 282 260" stroke="#0C1F3F" stroke-width="1.3" fill="none" stroke-linecap="round"/>
    <!-- Right arm — reaching through the gap toward the future -->
    <path d="M340 218 Q360 225 380 220 Q400 215 420 205" stroke="#0C1F3F" stroke-width="1.3" fill="none" stroke-linecap="round"/>
    <!-- Right hand open -->
    <path d="M420 205 L425 200 M420 205 L427 204 M420 205 L426 208" stroke="#0C1F3F" stroke-width="0.8" fill="none" stroke-linecap="round"/>
    <!-- Legs -->
    <path d="M310 295 Q308 320 305 345 Q303 360 300 378" stroke="#0C1F3F" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M318 295 Q325 320 332 345 Q336 360 340 375" stroke="#0C1F3F" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Feet -->
    <path d="M300 378 Q295 380 290 379" stroke="#0C1F3F" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M340 375 Q345 377 350 376" stroke="#0C1F3F" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <!-- Book / notebook under left arm -->
    <rect x="274" y="250" width="16" height="22" rx="2" stroke="#0C1F3F" stroke-width="1" fill="none" transform="rotate(-10 282 261)"/>
    <line x1="278" y1="254" x2="278" y2="270" stroke="#0C1F3F" stroke-width="0.5" transform="rotate(-10 282 261)"/>
  </g>

  <!-- THE FUTURE SIDE — constellations, nodes, light -->
  <g opacity="0.7">
    <!-- Constellation nodes (skills/stars) -->
    <circle cx="520" cy="150" r="4" fill="#00A8A8" opacity="0.6"/>
    <circle cx="580" cy="120" r="3" fill="#00A8A8" opacity="0.5"/>
    <circle cx="640" cy="160" r="5" fill="#00A8A8" opacity="0.7"/>
    <circle cx="600" cy="200" r="3.5" fill="#00A8A8" opacity="0.55"/>
    <circle cx="560" cy="240" r="4" fill="#00A8A8" opacity="0.6"/>
    <circle cx="680" cy="210" r="3" fill="#00A8A8" opacity="0.45"/>
    <circle cx="650" cy="270" r="4.5" fill="#00A8A8" opacity="0.65"/>
    <circle cx="540" cy="300" r="3" fill="#00A8A8" opacity="0.5"/>
    <circle cx="710" cy="150" r="3.5" fill="#00A8A8" opacity="0.5"/>
    <circle cx="720" cy="260" r="3" fill="#00A8A8" opacity="0.4"/>
    <circle cx="490" cy="200" r="3" fill="#00A8A8" opacity="0.4"/>
    <circle cx="610" cy="310" r="3.5" fill="#00A8A8" opacity="0.5"/>

    <!-- Constellation lines connecting nodes -->
    <line x1="520" y1="150" x2="580" y2="120" stroke="#00A8A8" stroke-width="0.5" opacity="0.3"/>
    <line x1="580" y1="120" x2="640" y2="160" stroke="#00A8A8" stroke-width="0.5" opacity="0.3"/>
    <line x1="640" y1="160" x2="600" y2="200" stroke="#00A8A8" stroke-width="0.5" opacity="0.3"/>
    <line x1="600" y1="200" x2="560" y2="240" stroke="#00A8A8" stroke-width="0.5" opacity="0.3"/>
    <line x1="640" y1="160" x2="680" y2="210" stroke="#00A8A8" stroke-width="0.5" opacity="0.3"/>
    <line x1="680" y1="210" x2="650" y2="270" stroke="#00A8A8" stroke-width="0.5" opacity="0.3"/>
    <line x1="560" y1="240" x2="540" y2="300" stroke="#00A8A8" stroke-width="0.5" opacity="0.3"/>
    <line x1="640" y1="160" x2="710" y2="150" stroke="#00A8A8" stroke-width="0.5" opacity="0.25"/>
    <line x1="680" y1="210" x2="720" y2="260" stroke="#00A8A8" stroke-width="0.5" opacity="0.25"/>
    <line x1="520" y1="150" x2="490" y2="200" stroke="#00A8A8" stroke-width="0.5" opacity="0.25"/>
    <line x1="490" y1="200" x2="560" y2="240" stroke="#00A8A8" stroke-width="0.5" opacity="0.25"/>
    <line x1="650" y1="270" x2="610" y2="310" stroke="#00A8A8" stroke-width="0.5" opacity="0.25"/>
    <line x1="540" y1="300" x2="610" y2="310" stroke="#00A8A8" stroke-width="0.5" opacity="0.25"/>

    <!-- Small sparkle dots scattered -->
    <circle cx="500" cy="130" r="1" fill="#0C1F3F" opacity="0.15"/>
    <circle cx="550" cy="170" r="1" fill="#0C1F3F" opacity="0.12"/>
    <circle cx="620" cy="140" r="1" fill="#0C1F3F" opacity="0.1"/>
    <circle cx="690" cy="180" r="1" fill="#0C1F3F" opacity="0.12"/>
    <circle cx="730" cy="200" r="1" fill="#0C1F3F" opacity="0.1"/>
    <circle cx="580" cy="280" r="1" fill="#0C1F3F" opacity="0.12"/>
    <circle cx="670" cy="300" r="1" fill="#0C1F3F" opacity="0.1"/>
    <circle cx="470" cy="250" r="1" fill="#0C1F3F" opacity="0.1"/>
  </g>

  <!-- LEFT SIDE labels — pen-ink style text -->
  <text x="120" y="200" font-family="Georgia, serif" font-size="13" fill="#0C1F3F" opacity="0.2" font-style="italic">gradebook</text>
  <text x="160" y="260" font-family="Georgia, serif" font-size="11" fill="#0C1F3F" opacity="0.15" font-style="italic">committees</text>
  <text x="100" y="310" font-family="Georgia, serif" font-size="12" fill="#0C1F3F" opacity="0.18" font-style="italic">waiting</text>
  <text x="180" y="340" font-family="Georgia, serif" font-size="10" fill="#0C1F3F" opacity="0.13" font-style="italic">memos</text>
  <text x="130" y="365" font-family="Georgia, serif" font-size="11" fill="#0C1F3F" opacity="0.15" font-style="italic">vendor RFPs</text>

  <!-- RIGHT SIDE labels -->
  <text x="510" y="345" font-family="Georgia, serif" font-size="11" fill="#00A8A8" opacity="0.35" font-style="italic">imagine</text>
  <text x="620" y="350" font-family="Georgia, serif" font-size="11" fill="#00A8A8" opacity="0.35" font-style="italic">build</text>
  <text x="700" y="330" font-family="Georgia, serif" font-size="11" fill="#00A8A8" opacity="0.3" font-style="italic">deploy</text>

  <!-- Bottom caption -->
  <text x="400" y="430" font-family="Georgia, serif" font-size="12" fill="#0C1F3F" opacity="0.3" text-anchor="middle" font-style="italic">the wall is down</text>
</svg>